<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Economics Keyword AI</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
     経済学キーワード検索</h1>
    <p>GDP・インフレ・CPIを学習するインタラクティブツール</p>
</header>

<div class="container">

<!-- 🔍 搜索 -->
<div class="card">
    <h2>キーワード検索</h2>

    <input id="searchInput" placeholder="例：GDP、インフレ、CPI">
    <button onclick="searchWord()">検索</button>

    <div class="popular">
        <span onclick="quickSearch('GDP')">GDP</span>
        <span onclick="quickSearch('CPI')">CPI</span>
        <span onclick="quickSearch('インフレ')">インフレ</span>
        <span onclick="quickSearch('失業率')">失業率</span>
    </div>
</div>

<!-- 📊 结果 -->
<div class="card" id="resultBox">
    <p>検索結果がここに表示されます</p>
</div>

<!-- 🧠 Concept -->
<div class="card">
    <h2>Concept Map</h2>

    <div class="concept-map">
        <div class="concept-card" onclick="searchWord('GDP')">GDP</div>
        <div class="concept-card" onclick="searchWord('CPI')">CPI</div>
        <div class="concept-card" onclick="searchWord('インフレ')">インフレ</div>
        <div class="concept-card" onclick="searchWord('失業率')">失業率</div>
        <div class="concept-card" onclick="searchWord('金融政策')">金融政策</div>
        <div class="concept-card" onclick="searchWord('金利')">金利</div>
        <div class="concept-card" onclick="searchWord('投資')">投資</div>
        <div class="concept-card" onclick="searchWord('貿易')">貿易</div>
    </div>
</div>

<!-- 🧠 Graph -->
<div class="card">
    <h2>🧠 関係ネットワーク</h2>
    <div id="graph"></div>
</div>

<!-- ⭐ 收藏 -->
<div class="card">
    <h2>お気に入り</h2>
    <ul id="favorites"></ul>
</div>

<!-- 📜 历史 -->
<div class="card">
    <h2>検索履歴</h2>
    <ul id="historyList"></ul>
    <button onclick="clearHistory()">履歴クリア</button>
</div>

<!-- 💬 Chat -->
<div class="card">
    <h2>💬 経済AIチャット</h2>

    <div id="chatBox" class="chat-box"></div>

    <div class="chat-input-area">
        <input id="chatInput" placeholder="例：GDPとは？">
        <button onclick="sendChat()">送信</button>
    </div>
</div>

</div>

<script src="script.js"></script>
</body>
</html>
